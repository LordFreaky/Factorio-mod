[heliopause-foundry]

menu_heliopause-foundry=Heliopause Foundry
title_heliopause-foundry=Heliopause Foundry: Errichte die Grenze. Überquere die Leere.

page_factoriomod_text_1=Du entdeckst, dass ausserhalb von Nauvis eine alte Industriezone existiert: die Heliopause Foundry, eine halb verlassene automatisierte Giesserei am Rand des Sonnensystems. Sie wurde gebaut, um Materialien zu verarbeiten, die nur dort entstehen, wo Sternenplasma und interstellarer Staub kollidieren. Dein Ziel ist es, diese Technologie zu rekonstruieren und eine eigene interstellare Produktionskette aufzubauen.
